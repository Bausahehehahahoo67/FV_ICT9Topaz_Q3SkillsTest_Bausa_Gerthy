<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Q3 Skills Test</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" >

        <style>
                 body {
                        background-image: url('https://media.tenor.com/VlqtakiHW9EAAAAe/fire-fire-writing.png');
                        background-size: cover;
                        background-repeat: no-repeat;
                         }

            .navbar-brand img, #logo { width:48px; height:48px; object-fit:cover; }
            .navbar { padding-top:0.25rem; padding-bottom:0.25rem; }
        </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <div class="navbar-nav me-auto">
                <span class="nav-link text-white">Home</span>
                <span class="nav-link text-white">Fare Matrix</span>
                <span class="nav-link text-white">Schedule</span>
                <span class="nav-link text-white">Map</span>
            </div>
                    <div class="navbar-nav">
                        <span class="nav-link text-white">Book</span>
                        <button class="btn btn-danger btn-sm">Create Account</button>
                    </div>
        </div>
</nav>

<br><br>

<div class="d-flex align-items-center justify-content-center" style="min-height:60vh;">
    <div class="card p-4 bg-dark bg-opacity-50 text-white" style="max-width:700px; width:100%;">
        <h1 class="mb-3">Register Form</h1>
        <p>Input all the necessary information, then click submit.</p>

        <form>
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input id="name" name="name" type="text" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="birthday" class="form-label">Birthday (Month/Day/Year)</label>
                <input id="birthday" name="birthday" type="text" inputmode="numeric" maxlength="8" pattern="^\d{2}\/\d{2}\/\d{2}$" placeholder="MM/DD/YY" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="contact" class="form-label">Contact Number</label>
                <input id="contact" name="contact" type="tel" inputmode="numeric" pattern="\d*" class="form-control" placeholder="0917-6767-676" required>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Enter desired username</label>
                <input id="username" name="username" type="text" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password <small class="text-warning">(BE SURE TO REMEMBER THE ENTERED PASSWORD)</small></label>
                <input id="password" name="password" type="password" class="form-control" required>
            </div>

            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </form>
    </div>
</div>

<script>
    (function(){
        const b = document.getElementById('birthday');
        const c = document.getElementById('contact');

        if(b){
            b.addEventListener('input', function(){
                let digits = this.value.replace(/\D/g,'').slice(0,6);
                const parts = [];
                if(digits.length > 0) parts.push(digits.slice(0,2));
                if(digits.length > 2) parts.push(digits.slice(2,4));
                if(digits.length > 4) parts.push(digits.slice(4,6));
                this.value = parts.join('/');
            });
            b.addEventListener('paste', function(e){
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
                const parts = [];
                if(paste.length > 0) parts.push(paste.slice(0,2));
                if(paste.length > 2) parts.push(paste.slice(2,4));
                if(paste.length > 4) parts.push(paste.slice(4,6));
                this.value = parts.join('/');
            });
            b.addEventListener('keydown', function(e){
                const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Home','End','Tab'];
                if (e.ctrlKey || e.metaKey) return; 
                if (allowed.includes(e.key)) return;
                if (/^[0-9]$/.test(e.key)) return;
                e.preventDefault();
            });
        }

        if(c){
            c.addEventListener('input', function(){
                this.value = this.value.replace(/\D/g,'').slice(0,15);
            });
            c.addEventListener('paste', function(e){
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,15);
                this.value = paste;
            });
            c.addEventListener('keydown', function(e){
                const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Home','End','Tab','+'];
                if (e.ctrlKey || e.metaKey) return; 
                if (allowed.includes(e.key)) return;
                if (/^[0-9]$/.test(e.key)) return;
                e.preventDefault();
            });
        }

        const toggleBtn = document.getElementById('togglePassword');
        const pwdInput = document.getElementById('password');

        const form = document.querySelector('form');
        if(form){
            form.addEventListener('submit', function(e){
                e.preventDefault();
                const username = document.getElementById('username').value;
                alert(`Welcome to the site! ${username}`);
            });
        }

    })();
</script>

</body>
</html>
